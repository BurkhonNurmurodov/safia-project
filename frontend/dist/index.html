<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zagruzka Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..700&display=swap" rel="stylesheet" />
    <!-- Self-hosted copy of https://telegram.org/js/telegram-web-app.js —
         some Windows machines block/intercept telegram.org (antivirus HTTPS
         inspection), which broke the app with a masked "Script error.".
         Re-sync the copy occasionally. -->
    <script src="/telegram-web-app.js"></script>
    <script type="module" crossorigin src="/assets/index-C9MMfhQz.js"></script>
    <link rel="modulepreload" crossorigin href="/assets/transliterate-L11IktgB.js">
    <link rel="stylesheet" crossorigin href="/assets/index-C1ftuSEH.css">
  </head>
  <body>
    <div id="root"></div>
    <script>
      // ES5-only boot diagnostics: expands the WebApp even if the bundle fails,
      // and surfaces startup errors + engine version on machines where React
      // never mounts (old WebView2 on some Windows laptops).
      (function () {
        try {
          if (window.Telegram && window.Telegram.WebApp) {
            window.Telegram.WebApp.ready();
            window.Telegram.WebApp.expand();
          }
        } catch (e) {}

        var errors = [];
        function envInfo() {
          var info = [];
          info.push('stage: ' + (window.__bootStage || 'inline only - bundle never started'));
          info.push('Telegram object: ' + (window.Telegram ? 'present' : 'MISSING'));
          try {
            var wa = window.Telegram && window.Telegram.WebApp;
            info.push('WebApp: ' + (wa
              ? 'present, initData length ' + ((wa.initData || '').length) +
                ', version ' + (wa.version || '?') + ', platform ' + (wa.platform || '?')
              : 'MISSING'));
          } catch (e) { info.push('WebApp probe failed: ' + e.message); }
          return info.join('\n');
        }
        // Shared chrome for the boot screens below (recovery + stale-version),
        // kept vanilla + self-contained so it renders even when the bundle/CSS
        // never loaded. Theme mirrors the in-app localStorage 'theme'.
        function palette() {
          var theme = 'dark';
          try {
            theme = localStorage.getItem('theme') ||
              document.documentElement.getAttribute('data-theme') || 'dark';
          } catch (e) {}
          return theme === 'light'
            ? { bg: '#faf8f5', text1: '#111827', text3: '#6b7280', brand: '#B07828',
                onBrand: '#ffffff', border: 'rgba(0,0,0,0.10)', techBg: '#f3f0ea' }
            : { bg: '#0f1117', text1: '#f3f4f6', text3: '#9ca3af', brand: '#C8973F',
                onBrand: '#1a1206', border: 'rgba(255,255,255,0.10)', techBg: '#0a0c11' };
        }
        function ensureAnims() {
          if (document.getElementById('safia-boot-anims')) return;
          var st = document.createElement('style');
          st.id = 'safia-boot-anims';
          st.textContent =
            '@keyframes safia-spin{to{transform:rotate(360deg)}}' +
            '@keyframes safia-pulse{0%,100%{opacity:1}50%{opacity:.5}}';
          (document.head || document.documentElement).appendChild(st);
        }
        function hardReload() {
          // Cache-buster defeats an intermediate cache re-serving a broken asset.
          location.replace(location.pathname + '?v=' + Date.now() + location.hash);
        }
        // Plain-language recovery copy in the 4 app languages (no exception
        // strings shown to the user — those live behind "technical details").
        var BOOT_STRINGS = {
          uz:      { title: "Ilova yuklanmadi", msg: "Aloqa uzildi va ilova to‘liq ochilmadi. Bu odatda o‘zi tuzaladi — qayta urinib ko‘ring.", retry: "Qayta urinish", reopen: "Ilovani qayta ochish", report: "Muammoni yuborish", sent: "Yuborildi — jamoaga xabar bordi", copied: "Nusxa olindi", details: "Texnik ma’lumot" },
          uz_cyrl: { title: "Илова юкланмади", msg: "Алоқа узилди ва илова тўлиқ очилмади. Бу одатда ўзи тузалади — қайта уриниб кўринг.", retry: "Қайта уриниш", reopen: "Иловани қайта очиш", report: "Муаммони юбориш", sent: "Юборилди — жамоага хабар борди", copied: "Нусха олинди", details: "Техник маълумот" },
          ru:      { title: "Приложение не загрузилось", msg: "Соединение прервалось, и приложение не открылось полностью. Обычно это решается повторной попыткой.", retry: "Повторить", reopen: "Открыть заново", report: "Сообщить о проблеме", sent: "Отправлено — команда уведомлена", copied: "Скопировано", details: "Технические детали" },
          en:      { title: "The app didn’t load", msg: "The connection dropped and the app didn’t finish loading. This usually fixes itself — try again.", retry: "Try again", reopen: "Reopen the app", report: "Report the problem", sent: "Sent — the team was notified", copied: "Copied", details: "Technical details" }
        };
        function bootLang() {
          var l = '';
          try { l = localStorage.getItem('lang') || ''; } catch (e) {}
          if (BOOT_STRINGS[l]) return l;
          var code = '';
          try {
            var u = window.Telegram && window.Telegram.WebApp &&
              window.Telegram.WebApp.initDataUnsafe && window.Telegram.WebApp.initDataUnsafe.user;
            code = (u && u.language_code) || navigator.language || '';
          } catch (e) {}
          code = String(code).toLowerCase();
          if (code.indexOf('ru') === 0) return 'ru';
          if (code.indexOf('en') === 0) return 'en';
          return 'uz';
        }
        // A content-hashed asset chunk 404'd — this client is running a stale
        // build after a redeploy (old index.html/bundle references hashes the
        // server has already pruned). Instead of the scary red diagnostics,
        // show a calm "new version" notice and reload once. Guarded so a reload
        // that can't fix it (e.g. a cached index.html still pointing at old
        // hashes) shows a "reopen the app" message instead of looping forever.
        function staleReload() {
          if (window.__staleReloadStarted) return;
          window.__staleReloadStarted = true;

          // Match the in-app theme (localStorage 'theme', the same source
          // ThemeContext reads; default dark) and the branded <PageLoader/> so
          // this screen looks like the app, not a raw dark box. Fully
          // self-contained: assumes NONE of the bundle's CSS is available (its
          // hashed stylesheet may be stale too), so colors + keyframes are inline.
          var p = palette();
          ensureAnims();

          // Branded logo loader mirroring components/ui/PageLoader.jsx: 96px
          // pulsing circular logo + a 24px brand spinner (gap on the right).
          function overlay(spinner, title, sub) {
            return (
              '<div style="display:flex;flex-direction:column;align-items:center;' +
              'justify-content:center;gap:20px">' +
                '<img src="/logo.png" alt="Safia" style="width:96px;height:96px;' +
                'border-radius:9999px;object-fit:cover;box-shadow:0 8px 32px rgba(0,0,0,0.18);' +
                'animation:safia-pulse 2s cubic-bezier(0.4,0,0.6,1) infinite" />' +
                (spinner
                  ? '<div style="width:24px;height:24px;border:3px solid ' + p.brand +
                    ';border-right-color:transparent;border-radius:9999px;' +
                    'animation:safia-spin 1s linear infinite"></div>'
                  : '') +
                '<div>' +
                  '<div style="font-size:16px;font-weight:600;color:' + p.text1 + '">' +
                    title + '</div>' +
                  '<div style="margin-top:6px;font-size:14px;color:' + p.text3 + '">' +
                    sub + '</div>' +
                '</div>' +
              '</div>'
            );
          }

          var KEY = 'chunkReloadAt';
          var last = 0;
          try { last = Number(sessionStorage.getItem(KEY) || 0); } catch (e) {}
          var reloadDidNotHelp = last && (Date.now() - last < 30000);

          var box = document.getElementById('boot-debug');
          if (!box) {
            box = document.createElement('div');
            box.id = 'boot-debug';
            document.body.appendChild(box);
          }
          box.setAttribute('style',
            'position:fixed;top:0;right:0;bottom:0;left:0;z-index:99999;' +
            'display:flex;align-items:center;justify-content:center;' +
            'text-align:center;padding:24px;background:' + p.bg + ';color:' + p.text1 + ';' +
            "font:15px/1.6 -apple-system,BlinkMacSystemFont,'Inter',sans-serif");

          if (reloadDidNotHelp) {
            box.innerHTML = overlay(false, 'Update needed',
              'Please close and reopen the app.');
            return;
          }

          // Paint once (stable logo — no flicker) and tick only the countdown.
          var n = 5;
          box.innerHTML = overlay(true, 'A new version is available',
            'Reloading… (<span id="safia-count">' + n + '</span>)');
          var timer = setInterval(function () {
            n -= 1;
            if (n > 0) {
              var c = document.getElementById('safia-count');
              if (c) c.textContent = n;
              return;
            }
            clearInterval(timer);
            try { sessionStorage.setItem(KEY, String(Date.now())); } catch (e) {}
            // Cache-buster on the document URL defeats an intermediate cache
            // (e.g. the nginx microcache) that might otherwise re-serve the
            // same stale index.html and dead-end the reload.
            location.replace(location.pathname + '?v=' + Date.now() + location.hash);
          }, 1000);
        }
        window.__staleReload = staleReload;
        function report() {
          if (window.__staleReloadStarted) return; // stale-version overlay owns the screen
          var details = 'App failed to start.\n\n' + errors.join('\n') +
            '\n\n' + envInfo() + '\n\nEngine: ' + navigator.userAgent;
          // Already painted — just refresh the (hidden) technical details so a
          // later error/rejection doesn't reset the user's buttons or logo.
          var existingTech = document.getElementById('boot-tech');
          if (existingTech) { existingTech.textContent = details; return; }

          var p = palette();
          ensureAnims();
          var S = BOOT_STRINGS[bootLang()];
          var box = document.getElementById('boot-debug');
          if (!box) {
            box = document.createElement('div');
            box.id = 'boot-debug';
            document.body.appendChild(box);
          }
          box.setAttribute('style',
            'position:fixed;top:0;right:0;bottom:0;left:0;z-index:99999;overflow:auto;' +
            'display:flex;align-items:center;justify-content:center;padding:24px;' +
            'background:' + p.bg + ';color:' + p.text1 + ';' +
            "font:15px/1.6 -apple-system,BlinkMacSystemFont,'Inter',sans-serif");
          box.innerHTML =
            '<div style="width:100%;max-width:320px;display:flex;flex-direction:column;' +
            'align-items:center;text-align:center;gap:16px">' +
              '<img src="/logo.png" alt="Safia" style="width:76px;height:76px;' +
              'border-radius:9999px;object-fit:cover;box-shadow:0 8px 32px rgba(0,0,0,0.18)"/>' +
              '<div>' +
                '<div style="font-size:17px;font-weight:600;color:' + p.text1 + '">' + S.title + '</div>' +
                '<div style="margin-top:8px;font-size:14px;line-height:1.6;color:' + p.text3 + '">' +
                  S.msg + '</div>' +
              '</div>' +
              '<button id="boot-retry" type="button" style="width:100%;padding:12px;border:none;' +
              'border-radius:12px;background:' + p.brand + ';color:' + p.onBrand + ';font-size:14px;' +
              'font-weight:600;cursor:pointer">' + S.retry + '</button>' +
              '<button id="boot-reopen" type="button" style="width:100%;padding:11px;' +
              'border:1px solid ' + p.border + ';border-radius:12px;background:transparent;color:' +
              p.text1 + ';font-size:14px;font-weight:500;cursor:pointer">' + S.reopen + '</button>' +
              '<button id="boot-report" type="button" style="width:100%;padding:8px;border:none;' +
              'background:transparent;color:' + p.text3 + ';font-size:13px;cursor:pointer">' +
                S.report + '</button>' +
              '<button id="boot-toggle" type="button" style="background:none;border:none;color:' +
              p.text3 + ';font-size:12px;cursor:pointer;opacity:.75">' + S.details + '</button>' +
              '<pre id="boot-tech" style="display:none;width:100%;margin:0;text-align:left;background:' +
              p.techBg + ';border:1px solid ' + p.border + ';border-radius:10px;padding:10px 12px;' +
              'font:11px/1.5 ui-monospace,SFMono-Regular,Menlo,monospace;color:' + p.text3 + ';' +
              'white-space:pre-wrap;word-break:break-word;max-height:180px;overflow:auto"></pre>' +
            '</div>';
          document.getElementById('boot-tech').textContent = details;

          document.getElementById('boot-retry').onclick = hardReload;
          document.getElementById('boot-reopen').onclick = function () {
            try {
              var wa = window.Telegram && window.Telegram.WebApp;
              if (wa && typeof wa.close === 'function') { wa.close(); return; }
            } catch (e) {}
            hardReload(); // not in Telegram — a fresh load is the next best thing
          };
          var tech = document.getElementById('boot-tech');
          document.getElementById('boot-toggle').onclick = function () {
            tech.style.display = tech.style.display === 'none' ? 'block' : 'none';
          };
          // One-tap report: POST diagnostics to /api/boot-report, which forwards
          // them to the support Telegram chat. If that fails (offline, endpoint
          // unreachable) we fall back to copying the details to the clipboard so
          // the button is always useful.
          document.getElementById('boot-report').onclick = function () {
            var btn = this;
            btn.disabled = true; btn.style.opacity = '0.6';
            var sent = function () { btn.textContent = S.sent; btn.style.color = '#22c55e'; btn.style.opacity = '1'; };
            var copied = function () { btn.textContent = S.copied; btn.style.color = p.text1; btn.style.opacity = '1'; };
            var reset = function () { btn.disabled = false; btn.style.opacity = '1'; };
            var copy = function () {
              try {
                if (navigator.clipboard && navigator.clipboard.writeText) {
                  navigator.clipboard.writeText(details).then(copied, reset); return;
                }
              } catch (e) {}
              reset();
            };
            var initData = '';
            try { var wa = window.Telegram && window.Telegram.WebApp; initData = (wa && wa.initData) || ''; } catch (e) {}
            try {
              fetch('/api/boot-report', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ stage: window.__bootStage || '', ua: navigator.userAgent, details: details, initData: initData })
              }).then(function (r) { if (r && r.ok) { sent(); } else { copy(); } }, copy);
            } catch (e) { copy(); }
          };
        }
        // True once React has painted something into #root. After that the app
        // is running: the React error boundary owns render failures, so a stray
        // window error/rejection must not throw up the full recovery screen.
        function appMounted() {
          var root = document.getElementById('root');
          return !!(root && root.childNodes.length);
        }
        window.addEventListener('error', function (e) {
          if (e.target && e.target.tagName) {
            // A broken <img> (content) or <link> (a blocked font stylesheet /
            // favicon) is never a boot failure — the bundle still runs. Images
            // are handled inline; ignore both here instead of hijacking the screen.
            if (e.target.tagName === 'IMG' || e.target.tagName === 'LINK') return;
            var url = e.target.src || e.target.href || '';
            if (/\/assets\/[^?#]+\.js(\?|#|$)/.test(url)) {
              staleReload(); // stale hashed chunk after a redeploy — reload, don't panic
              return;
            }
            errors.push('Failed to load: ' + (url || e.target.tagName));
          } else {
            if (appMounted()) return; // running app — let the error boundary/console handle it
            errors.push((e.message || 'script error') +
              (e.filename ? ' @ ' + e.filename + ':' + e.lineno : ''));
          }
          report();
        }, true);
        window.addEventListener('unhandledrejection', function (e) {
          if (appMounted()) return; // a stray rejection in a running app isn't a boot failure
          var r = e.reason;
          errors.push('unhandled rejection: ' + (r && (r.message || String(r))));
          report();
        });
        setTimeout(function () {
          var root = document.getElementById('root');
          if (root && root.childNodes.length === 0) {
            if (!errors.length) {
              errors.push('No JS error captured - bundle did not load or did not run.');
            }
            report();
          }
        }, 10000);
      })();
    </script>
  </body>
</html>
