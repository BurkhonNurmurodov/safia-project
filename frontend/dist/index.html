<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zagruzka Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..700&display=swap" rel="stylesheet" />
    <!-- Self-hosted copy of https://telegram.org/js/telegram-web-app.js —
         some Windows machines block/intercept telegram.org (antivirus HTTPS
         inspection), which broke the app with a masked "Script error.".
         Re-sync the copy occasionally. -->
    <script src="/telegram-web-app.js"></script>
    <script type="module" crossorigin src="/assets/index-D4qda_cr.js"></script>
    <link rel="modulepreload" crossorigin href="/assets/transliterate-sdtfbOfq.js">
    <link rel="stylesheet" crossorigin href="/assets/index-BIIXjpzd.css">
  </head>
  <body>
    <div id="root"></div>
    <script>
      // ES5-only boot diagnostics: expands the WebApp even if the bundle fails,
      // and surfaces startup errors + engine version on machines where React
      // never mounts (old WebView2 on some Windows laptops).
      (function () {
        try {
          if (window.Telegram && window.Telegram.WebApp) {
            window.Telegram.WebApp.ready();
            window.Telegram.WebApp.expand();
          }
        } catch (e) {}

        var errors = [];
        function envInfo() {
          var info = [];
          info.push('stage: ' + (window.__bootStage || 'inline only - bundle never started'));
          info.push('Telegram object: ' + (window.Telegram ? 'present' : 'MISSING'));
          try {
            var wa = window.Telegram && window.Telegram.WebApp;
            info.push('WebApp: ' + (wa
              ? 'present, initData length ' + ((wa.initData || '').length) +
                ', version ' + (wa.version || '?') + ', platform ' + (wa.platform || '?')
              : 'MISSING'));
          } catch (e) { info.push('WebApp probe failed: ' + e.message); }
          return info.join('\n');
        }
        // A content-hashed asset chunk 404'd — this client is running a stale
        // build after a redeploy (old index.html/bundle references hashes the
        // server has already pruned). Instead of the scary red diagnostics,
        // show a calm "new version" notice and reload once. Guarded so a reload
        // that can't fix it (e.g. a cached index.html still pointing at old
        // hashes) shows a "reopen the app" message instead of looping forever.
        function staleReload() {
          if (window.__staleReloadStarted) return;
          window.__staleReloadStarted = true;

          // Match the in-app theme (localStorage 'theme', the same source
          // ThemeContext reads; default dark) and the branded <PageLoader/> so
          // this screen looks like the app, not a raw dark box. Fully
          // self-contained: assumes NONE of the bundle's CSS is available (its
          // hashed stylesheet may be stale too), so colors + keyframes are inline.
          var theme = 'dark';
          try {
            theme = localStorage.getItem('theme') ||
              document.documentElement.getAttribute('data-theme') || 'dark';
          } catch (e) {}
          var p = theme === 'light'
            ? { bg: '#faf8f5', text1: '#111827', text3: '#6b7280', brand: '#B07828' }
            : { bg: '#0f1117', text1: '#f3f4f6', text3: '#6b7280', brand: '#C8973F' };

          if (!document.getElementById('safia-boot-anims')) {
            var st = document.createElement('style');
            st.id = 'safia-boot-anims';
            st.textContent =
              '@keyframes safia-spin{to{transform:rotate(360deg)}}' +
              '@keyframes safia-pulse{0%,100%{opacity:1}50%{opacity:.5}}';
            (document.head || document.documentElement).appendChild(st);
          }

          // Branded logo loader mirroring components/ui/PageLoader.jsx: 96px
          // pulsing circular logo + a 24px brand spinner (gap on the right).
          function overlay(spinner, title, sub) {
            return (
              '<div style="display:flex;flex-direction:column;align-items:center;' +
              'justify-content:center;gap:20px">' +
                '<img src="/logo.png" alt="Safia" style="width:96px;height:96px;' +
                'border-radius:9999px;object-fit:cover;box-shadow:0 8px 32px rgba(0,0,0,0.18);' +
                'animation:safia-pulse 2s cubic-bezier(0.4,0,0.6,1) infinite" />' +
                (spinner
                  ? '<div style="width:24px;height:24px;border:3px solid ' + p.brand +
                    ';border-right-color:transparent;border-radius:9999px;' +
                    'animation:safia-spin 1s linear infinite"></div>'
                  : '') +
                '<div>' +
                  '<div style="font-size:16px;font-weight:600;color:' + p.text1 + '">' +
                    title + '</div>' +
                  '<div style="margin-top:6px;font-size:14px;color:' + p.text3 + '">' +
                    sub + '</div>' +
                '</div>' +
              '</div>'
            );
          }

          var KEY = 'chunkReloadAt';
          var last = 0;
          try { last = Number(sessionStorage.getItem(KEY) || 0); } catch (e) {}
          var reloadDidNotHelp = last && (Date.now() - last < 30000);

          var box = document.getElementById('boot-debug');
          if (!box) {
            box = document.createElement('div');
            box.id = 'boot-debug';
            document.body.appendChild(box);
          }
          box.setAttribute('style',
            'position:fixed;top:0;right:0;bottom:0;left:0;z-index:99999;' +
            'display:flex;align-items:center;justify-content:center;' +
            'text-align:center;padding:24px;background:' + p.bg + ';color:' + p.text1 + ';' +
            "font:15px/1.6 -apple-system,BlinkMacSystemFont,'Inter',sans-serif");

          if (reloadDidNotHelp) {
            box.innerHTML = overlay(false, 'Update needed',
              'Please close and reopen the app.');
            return;
          }

          // Paint once (stable logo — no flicker) and tick only the countdown.
          var n = 5;
          box.innerHTML = overlay(true, 'A new version is available',
            'Reloading… (<span id="safia-count">' + n + '</span>)');
          var timer = setInterval(function () {
            n -= 1;
            if (n > 0) {
              var c = document.getElementById('safia-count');
              if (c) c.textContent = n;
              return;
            }
            clearInterval(timer);
            try { sessionStorage.setItem(KEY, String(Date.now())); } catch (e) {}
            // Cache-buster on the document URL defeats an intermediate cache
            // (e.g. the nginx microcache) that might otherwise re-serve the
            // same stale index.html and dead-end the reload.
            location.replace(location.pathname + '?v=' + Date.now() + location.hash);
          }, 1000);
        }
        window.__staleReload = staleReload;
        function report() {
          if (window.__staleReloadStarted) return; // stale-version overlay owns the screen
          var el = document.getElementById('boot-debug');
          if (!el) {
            el = document.createElement('div');
            el.id = 'boot-debug';
            el.setAttribute('style',
              'position:fixed;left:0;right:0;bottom:0;z-index:99999;' +
              'background:#7f1d1d;color:#fff;font:12px/1.5 monospace;' +
              'padding:10px 12px;white-space:pre-wrap;word-break:break-word;' +
              'max-height:45%;overflow:auto');
            document.body.appendChild(el);
          }
          el.textContent = 'App failed to start.\n\n' + errors.join('\n') +
            '\n\n' + envInfo() + '\n\nEngine: ' + navigator.userAgent;
        }
        window.addEventListener('error', function (e) {
          if (e.target && e.target.tagName) {
            var url = e.target.src || e.target.href || '';
            if (/\/assets\/[^?#]+\.js(\?|#|$)/.test(url)) {
              staleReload(); // stale hashed chunk after a redeploy — reload, don't panic
              return;
            }
            errors.push('Failed to load: ' + (url || e.target.tagName));
          } else {
            errors.push((e.message || 'script error') +
              (e.filename ? ' @ ' + e.filename + ':' + e.lineno : ''));
          }
          report();
        }, true);
        window.addEventListener('unhandledrejection', function (e) {
          var r = e.reason;
          errors.push('unhandled rejection: ' + (r && (r.message || String(r))));
          report();
        });
        setTimeout(function () {
          var root = document.getElementById('root');
          if (root && root.childNodes.length === 0) {
            if (!errors.length) {
              errors.push('No JS error captured - bundle did not load or did not run.');
            }
            report();
          }
        }, 10000);
      })();
    </script>
  </body>
</html>
