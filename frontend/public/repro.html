<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>SegmentedToggle fill repro</title>
<style>
  :root{
    --bg-card:#FBF7F0; --bg-inner:#EFE4D0; --border:#E0D2B8;
    --text-1:#2A2118; --text-3:#8A7A63; --brand:#C8973F;
  }
  *{box-sizing:border-box;font-family:-apple-system,Segoe UI,Roboto,sans-serif;}
  body{background:#efeae1;margin:0;padding:28px;}
  .panel{background:var(--bg-card);border:1px solid var(--border);border-radius:16px;
    padding:20px;max-width:520px;margin:0 auto 26px;}
  .panel h2{margin:0 0 18px;font-size:15px;color:var(--text-1);}
  .field{display:flex;flex-direction:column;gap:8px;margin-bottom:18px;}
  .lbl{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--text-3);font-weight:600;}

  /* --- SegmentedToggle track (matches component) --- */
  .track{align-items:center;gap:4px;border-radius:12px;padding:3px;
    background:var(--bg-inner);border:1px solid var(--border);}
  .track.inline{display:inline-flex;}            /* BEFORE: bunched left */
  .track.fill{display:flex;width:100%;}          /* AFTER : fills evenly  */
  .seg{display:inline-flex;align-items:center;justify-content:center;gap:6px;
    border-radius:8px;font-weight:500;white-space:nowrap;font-size:14px;
    padding:5px 12px;border:none;cursor:pointer;background:transparent;color:var(--text-3);}
  .track.fill .seg{flex:1 1 0;}
  .seg.active{background:var(--brand);color:#fff;font-weight:600;}
</style>
</head>
<body>

  <div class="panel">
    <h2>BEFORE — <code>inline-flex</code> stretched by the flex-column field (the bug)</h2>
    <div class="field">
      <span class="lbl">Смена</span>
      <div class="track inline">
        <button class="seg active">Все</button>
        <button class="seg">S1</button>
        <button class="seg">S2</button>
      </div>
    </div>
    <div class="field">
      <span class="lbl">Единица</span>
      <div class="track inline">
        <button class="seg active">мин</button>
        <button class="seg">час</button>
      </div>
    </div>
  </div>

  <div class="panel">
    <h2>AFTER — <code>fill</code> prop: <code>flex w-full</code> + <code>flex-1</code> segments</h2>
    <div class="field">
      <span class="lbl">Смена</span>
      <div class="track fill">
        <button class="seg active">Все</button>
        <button class="seg">S1</button>
        <button class="seg">S2</button>
      </div>
    </div>
    <div class="field">
      <span class="lbl">Единица</span>
      <div class="track fill">
        <button class="seg active">мин</button>
        <button class="seg">час</button>
      </div>
    </div>
  </div>

</body>
</html>
