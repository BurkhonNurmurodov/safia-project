<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<title>ComparisonTable toggle size repro</title>
<style>
  :root{
    --bg-card:#FBF7F0; --bg-inner:#EFE4D0; --border:#E0D2B8; --border-md:#D8C8AC;
    --text-2:#4A3D2C; --text-3:#8A7A63; --brand:#C8973F;
  }
  *{box-sizing:border-box;font-family:-apple-system,Segoe UI,Roboto,sans-serif;}
  body{background:#efeae1;margin:0;padding:28px;}
  .card{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:16px;max-width:520px;margin:0 auto 22px;}
  .row{display:flex;align-items:center;gap:8px;}
  .h{font-size:12px;font-weight:600;color:var(--text-2);margin:0 0 12px;}

  /* SegmentedToggle track */
  .track{display:inline-flex;align-items:center;gap:4px;border-radius:12px;padding:3px;background:var(--bg-inner);border:1px solid var(--border);}
  .seg{display:inline-flex;align-items:center;justify-content:center;gap:6px;border-radius:8px;font-weight:500;white-space:nowrap;border:none;cursor:pointer;background:transparent;color:var(--text-3);}
  .md .seg{padding:5px 12px;font-size:14px;line-height:20px;}   /* size md = text-sm */
  .sm .seg{padding:3px 10px;font-size:12px;line-height:16px;}   /* size sm = text-xs */
  .seg.active{background:var(--brand);color:#fff;font-weight:600;}

  /* icon buttons */
  .iconbtn-old{flex:none;padding:6px;border-radius:8px;background:var(--bg-inner);border:1px solid var(--border-md);color:var(--text-3);display:inline-flex;}
  .iconbtn-new{flex:none;height:38px;width:38px;display:flex;align-items:center;justify-content:center;border-radius:8px;background:var(--bg-inner);border:1px solid var(--border-md);color:var(--text-3);}
  svg{display:block;}
</style>
</head>
<body>
  <div class="card">
    <p class="h">BEFORE — sm toggle (~30px) + p-1.5 icon (~28px)</p>
    <div class="row">
      <div class="track sm">
        <button class="seg active">Taqqoslash</button>
        <button class="seg">Farq</button>
      </div>
      <button class="iconbtn-old"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg></button>
    </div>
  </div>

  <div class="card">
    <p class="h">AFTER — md toggle (38px) + 38px icon (aligned)</p>
    <div class="row">
      <div class="track md">
        <button class="seg active">Taqqoslash</button>
        <button class="seg">Farq</button>
      </div>
      <button class="iconbtn-new"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg></button>
    </div>
  </div>
</body>
</html>
